<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>《如果》· 体验版</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0e0f17;--ink:#e8e9f0;--dim:#9aa0b5;--gold:#e8c178;--line:#a8c0ff;--card:#1a1c28;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"PingFang SC",sans-serif;
    display:flex;justify-content:center;min-height:100vh;}
  #app{width:100%;max-width:440px;height:100vh;height:100dvh;overflow:hidden;
    background:linear-gradient(180deg,#0e0f17,#141622);
    display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5);}

  /* 视频场景层 —— 平时窄带，路口涨满 */
  #videoband{position:relative;width:100%;height:64px;overflow:hidden;flex-shrink:0;
    background:#000;transition:height .55s cubic-bezier(.7,0,.2,1);z-index:15;cursor:pointer;}
  #videoband.full{height:56vh;}
  #videoband video{width:100%;height:100%;object-fit:cover;display:block;}
  /* 展开/收起提示箭头 */
  #videoband .vtoggle{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);z-index:4;
    font-size:12px;color:rgba(232,237,255,.7);text-shadow:0 1px 6px rgba(0,0,0,.9);
    pointer-events:none;letter-spacing:2px;transition:.3s;}
  #videoband.full .vtoggle{bottom:auto;top:12px;left:50%;transform:translateX(-50%);}
  #videoband::after{content:'';position:absolute;left:0;right:0;bottom:0;height:46%;
    background:linear-gradient(to top,#0e0f17 2%,rgba(14,15,23,.6) 40%,transparent);pointer-events:none;}
  #videoband .vcaption{position:absolute;left:18px;bottom:14px;right:18px;z-index:2;
    font-size:13px;color:rgba(232,237,255,.9);letter-spacing:1px;
    text-shadow:0 2px 12px rgba(0,0,0,.9);opacity:0;transition:opacity .8s;
    font-family:"Songti SC","SimSun",serif;}
  #videoband.full .vcaption{opacity:.96;font-size:15px;}
  #videoband .vyear{position:absolute;left:18px;top:12px;z-index:2;font-size:12px;
    color:var(--gold);letter-spacing:2px;text-shadow:0 2px 10px rgba(0,0,0,.9);opacity:.9;}
  #videoband .vsound{position:absolute;right:14px;top:10px;z-index:3;font-size:16px;cursor:pointer;
    opacity:.7;transition:.18s;text-shadow:0 2px 8px rgba(0,0,0,.9);}
  #videoband .vsound:hover{opacity:1;}

  /* 顶栏：世界时钟 */
  .topbar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(255,255,255,.06);
    background:rgba(14,15,23,.92);backdrop-filter:blur(10px);z-index:20;flex-shrink:0;}
  .clockbox{line-height:1.4;}
  .clock-line{display:flex;align-items:baseline;gap:8px;}
  .clock-date{font-size:14px;color:var(--gold);letter-spacing:.5px;font-weight:600;}
  .clock-time{font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;
    font-family:"SF Mono",Menlo,monospace;letter-spacing:1px;opacity:.92;}
  .clock-sub{font-size:11px;color:var(--dim);margin-top:2px;}
  .clk-where{margin-left:8px;}
  .tree-btn{font-size:12px;color:var(--line);border:1px solid rgba(168,192,255,.3);
    padding:5px 11px;border-radius:14px;cursor:pointer;transition:.18s;}
  .tree-btn:hover{background:rgba(168,192,255,.12);}
  .hud-btn{font-size:12px;color:var(--gold);border:1px solid rgba(232,193,120,.3);
    padding:5px 11px;border-radius:14px;cursor:pointer;transition:.18s;margin-right:8px;}
  .hud-btn:hover{background:rgba(232,193,120,.12);}

  /* 章节翻页：横向 transform 轨道 */
  #book{flex:1;position:relative;overflow:hidden;min-height:0;}
  #booktrack{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1);}
  .chapter{flex:0 0 100%;width:100%;height:100%;overflow-y:auto;padding:20px 18px 130px;}
  .chapter::-webkit-scrollbar{display:none;}
  #bookNav{position:absolute;left:0;right:0;bottom:0;z-index:24;
    display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 0 14px;
    background:linear-gradient(0deg,#0e0f17 60%,transparent);pointer-events:none;}
  #bookNav .bn-arrow{pointer-events:auto;cursor:pointer;color:var(--line);font-size:22px;
    width:34px;height:34px;line-height:32px;text-align:center;border-radius:50%;
    border:1px solid rgba(168,192,255,.3);transition:.15s;opacity:.8;}
  #bookNav .bn-arrow:hover{background:rgba(168,192,255,.14);}
  #bookNav .bn-arrow.disabled{opacity:.2;pointer-events:none;}
  .bn-dots{display:flex;gap:6px;align-items:center;max-width:60%;overflow:hidden;flex-wrap:nowrap;}
  .bn-dots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);flex-shrink:0;transition:.2s;cursor:pointer;}
  .bn-dots .dot.on{background:var(--gold);width:8px;height:8px;}

  .narr{font-size:15px;line-height:1.95;color:var(--ink);margin-bottom:20px;
    opacity:0;transform:translateY(8px);animation:fadeUp .6s ease forwards;}
  .narr.dim{color:var(--dim);font-size:14px;}
  .yeartag{display:inline-block;font-size:11px;color:var(--gold);letter-spacing:1px;
    border-left:2px solid var(--gold);padding-left:8px;margin:6px 0 14px;opacity:.85;}
  @keyframes fadeUp{to{opacity:1;transform:none;}}
  @keyframes pulse-dim{0%,100%{opacity:.4}50%{opacity:.8}}

  .ai-seg{margin-bottom:6px;}
  .correct-link{font-size:12px;color:rgba(168,192,255,.6);cursor:pointer;
    margin:-6px 0 18px;display:inline-block;transition:.15s;border-bottom:1px dashed rgba(168,192,255,.3);}
  .correct-link:hover{color:var(--line);}
  .future-tag{font-size:11px;color:rgba(154,160,181,.5);margin:-4px 0 18px;font-style:italic;}
  .future-deny{font-size:14px;color:var(--gold);letter-spacing:1px;line-height:1.9;
    margin:8px 0 18px;opacity:0;transform:translateY(6px);transition:.7s ease;
    font-family:"Songti SC","SimSun",serif;}
  .future-deny.show{opacity:.95;transform:none;}

  /* 世界事件卡 */
  .event{background:var(--card);border:1px solid rgba(232,193,120,.28);border-radius:16px;
    padding:18px;margin:8px 0 20px;opacity:0;animation:fadeUp .6s ease forwards;
    box-shadow:0 8px 30px rgba(0,0,0,.3);}
  .event .ico{font-size:24px;margin-bottom:10px;}
  .event .etitle{font-size:13px;color:var(--gold);letter-spacing:1px;margin-bottom:8px;}
  .event .ebody{font-size:14.5px;line-height:1.8;color:var(--ink);}
  .event .open-btn{margin-top:14px;display:inline-block;padding:9px 18px;border-radius:20px;
    background:rgba(232,193,120,.16);border:1px solid rgba(232,193,120,.5);color:var(--gold);
    font-size:13px;cursor:pointer;transition:.18s;}
  .event .open-btn:hover{background:rgba(232,193,120,.28);}

  /* 决策面板 */
  #decision{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:440px;margin:0 auto;
    background:linear-gradient(0deg,#11131e 80%,rgba(17,19,30,.96));border-top:1px solid rgba(232,193,120,.3);
    padding:18px 18px 22px;transform:translateY(110%);transition:transform .45s cubic-bezier(.22,.61,.36,1);
    border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;}
  #decision.show{transform:none;}
  .d-prompt{font-size:13px;color:var(--dim);margin-bottom:4px;}
  .d-q{font-size:16px;line-height:1.7;margin-bottom:16px;color:var(--ink);}
  .opt{padding:14px 16px;border-radius:13px;background:rgba(255,255,255,.05);
    border:1px solid rgba(168,192,255,.2);color:var(--ink);font-size:14px;line-height:1.5;
    cursor:pointer;transition:.18s;margin-bottom:10px;}
  .opt:hover{background:rgba(168,192,255,.14);border-color:rgba(168,192,255,.5);transform:translateX(3px);}
  .opt .sub{display:block;font-size:11.5px;color:var(--dim);margin-top:4px;}
  .opt.custom{border-style:dashed;border-color:rgba(232,193,120,.4);color:var(--gold);}
  .custom-box{display:none;margin-top:4px;}
  .custom-box.show{display:block;}
  .custom-box textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(232,193,120,.4);
    border-radius:11px;padding:12px;color:var(--ink);font-size:14px;font-family:inherit;resize:none;min-height:64px;}
  .custom-box .send{margin-top:8px;width:100%;padding:11px;border-radius:11px;background:var(--gold);
    color:#1a1407;font-size:14px;font-weight:600;border:none;cursor:pointer;}

  /* 结算档位浮现 */
  .tier-badge{display:inline-block;font-size:12px;letter-spacing:2px;padding:3px 12px;border-radius:12px;
    margin:2px 0 14px;font-family:"Songti SC",serif;}
  .tier-顺遂{color:#9fd6a0;background:rgba(159,214,160,.12);border:1px solid rgba(159,214,160,.35);}
  .tier-磕绊{color:#c9a0a0;background:rgba(201,160,160,.12);border:1px solid rgba(201,160,160,.3);}

  /* 此刻面板 */
  .now-panel{margin:28px 0 10px;padding:20px 18px;border-radius:16px;text-align:center;
    border-top:1px solid rgba(255,255,255,.07);opacity:0;animation:fadeUp .7s ease forwards;}
  .now-panel .np-now{font-size:12px;color:var(--gold);letter-spacing:4px;margin-bottom:12px;
    font-family:"Songti SC","SimSun",serif;}
  .now-panel .np-line{font-size:16.5px;color:var(--ink);line-height:1.9;margin-bottom:18px;font-weight:500;}
  .now-panel .np-acts{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;}
  .now-panel .np-dot{color:rgba(255,255,255,.2);font-size:12px;}
  .now-panel .np-onward,.now-panel .np-travel{font-size:13px;cursor:pointer;transition:.18s;
    color:var(--dim);letter-spacing:1px;border-bottom:1px solid transparent;padding-bottom:2px;}
  .now-panel .np-onward:hover{color:var(--line);border-bottom-color:rgba(168,192,255,.5);}
  .now-panel .np-travel:hover{color:var(--gold);border-bottom-color:rgba(232,193,120,.5);}
  .now-panel .np-end-link{font-size:13px;cursor:pointer;color:rgba(154,160,181,.7);letter-spacing:1px;
    border-bottom:1px solid transparent;padding-bottom:2px;transition:.18s;}
  .now-panel .np-end-link:hover{color:#c9a0a0;border-bottom-color:rgba(201,160,160,.5);}

  /* 终章 */
  .finale-seg{margin:36px 6px 40px;text-align:center;}
  .finale-line{font-size:16px;line-height:2.2;color:#e8e9f0;margin-bottom:22px;
    opacity:0;animation:fadeUp 1.6s ease forwards;font-family:"Songti SC","SimSun",serif;}
  .finale-sign{font-size:13px;color:var(--gold);letter-spacing:2px;margin-top:30px;
    opacity:0;animation:fadeUp 1.6s ease forwards;font-family:"Songti SC","SimSun",serif;}
  .finale-again{margin-top:40px;font-size:12.5px;color:var(--dim);cursor:pointer;letter-spacing:1px;
    opacity:0;animation:fadeUp 1.6s ease forwards;padding-bottom:2px;
    border-bottom:1px solid rgba(168,192,255,.25);display:inline-block;transition:.18s;}
  .finale-again:hover{color:var(--line);border-bottom-color:rgba(168,192,255,.6);}

  /* 时空穿梭抽屉 */
  #tree{position:fixed;inset:0;max-width:440px;margin:0 auto;background:rgba(8,9,14,.97);
    z-index:40;padding:20px 18px;transform:translateX(100%);transition:transform .4s;overflow-y:auto;}
  #tree.show{transform:none;}
  #tree h3{font-size:15px;color:var(--gold);margin-bottom:4px;}
  #tree .hint{font-size:12px;color:var(--dim);margin-bottom:18px;line-height:1.6;}
  #tree .close{position:absolute;top:18px;right:18px;color:var(--dim);font-size:20px;cursor:pointer;}
  #tlWrap{margin-top:30px;}
  #tlReadout{text-align:center;margin-bottom:26px;}
  #tlYear{display:block;font-size:30px;color:var(--gold);letter-spacing:2px;font-family:"Songti SC","SimSun",serif;}
  #tlSub{display:block;font-size:13px;color:var(--dim);margin-top:6px;line-height:1.6;}
  #tlTrack{position:relative;height:44px;margin:0 12px;display:flex;align-items:center;}
  #tlTrack::before{content:'';position:absolute;left:0;right:0;height:3px;border-radius:2px;background:rgba(168,192,255,.18);}
  #tlFill{position:absolute;left:0;height:3px;border-radius:2px;background:linear-gradient(90deg,#a8c0ff,#e8c178);width:0;}
  #tlNodes{position:absolute;left:0;right:0;height:100%;}
  #tlNodes .tlnode{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;
    background:var(--card);border:2px solid var(--line);transform:translate(-50%,-50%);cursor:pointer;transition:.15s;}
  #tlNodes .tlnode:hover{transform:translate(-50%,-50%) scale(1.3);}
  #tlHandle{position:absolute;top:50%;width:24px;height:24px;border-radius:50%;
    background:var(--gold);transform:translate(-50%,-50%);cursor:grab;z-index:3;
    box-shadow:0 0 0 5px rgba(232,193,120,.18),0 2px 10px rgba(0,0,0,.5);touch-action:none;}
  #tlHandle:active{cursor:grabbing;}
  #tlLabels{display:flex;justify-content:space-between;margin:10px 12px 0;font-size:11px;color:var(--dim);}
  #tlGo{margin:30px auto 0;display:block;padding:13px 30px;border-radius:24px;background:var(--gold);
    color:#1a1407;font-size:15px;font-weight:600;border:none;cursor:pointer;letter-spacing:1px;
    opacity:.5;pointer-events:none;transition:.2s;}
  #tlGo.ready{opacity:1;pointer-events:auto;}
  .tl-choice{text-align:center;margin-top:14px;font-size:12.5px;color:var(--dim);line-height:1.6;min-height:16px;}

  /* 状态 HUD */
  #hud{position:fixed;inset:0;max-width:440px;margin:0 auto;background:rgba(8,9,14,.97);z-index:40;
    padding:20px 18px;transform:translateX(-100%);transition:transform .4s;overflow-y:auto;}
  #hud.show{transform:none;}
  #hud h3{font-size:15px;color:var(--gold);margin-bottom:14px;}
  #hud .close{position:absolute;top:18px;right:18px;color:var(--dim);font-size:20px;cursor:pointer;}
  .stat-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
  .stat-name{width:46px;font-size:13px;color:var(--dim);}
  .stat-bar{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
  .stat-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#a8c0ff,#e8c178);transition:width .5s;}
  .stat-val{width:30px;text-align:right;font-size:12px;color:var(--ink);}
  .hud-sec{font-size:12px;color:var(--gold);letter-spacing:1px;margin:18px 0 10px;opacity:.8;}
  .tag-chip{display:inline-block;font-size:12px;color:var(--ink);background:rgba(232,193,120,.12);
    border:1px solid rgba(232,193,120,.3);padding:3px 10px;border-radius:10px;margin:0 6px 6px 0;}

  /* 开场 */
  #intro{position:fixed;inset:0;max-width:440px;margin:0 auto;background:#0e0f17;z-index:60;
    display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;
    text-align:center;transition:opacity .8s;}
  #intro h1{font-size:34px;letter-spacing:8px;color:var(--gold);margin-bottom:20px;font-family:"Songti SC","SimSun",serif;}
  #intro p{font-size:14px;color:var(--dim);line-height:2;margin-bottom:8px;}
  #intro .start{margin-top:34px;padding:12px 34px;border-radius:24px;background:transparent;
    border:1px solid var(--gold);color:var(--gold);font-size:15px;letter-spacing:2px;cursor:pointer;transition:.2s;}
  #intro .start:hover{background:rgba(232,193,120,.14);}
  #intro .ver{margin-top:30px;font-size:11px;opacity:.5;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="clockbox">
      <div class="clock-line"><span class="clock-date" id="clkDate">—</span><span class="clock-time" id="clkTime"></span></div>
      <div class="clock-sub"><span id="clkAge"></span><span class="clk-where" id="clkWhere"></span></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="hud-btn" id="openHud">◴ 此身</div>
      <div class="tree-btn" id="openTree">⌖ 时空穿梭</div>
    </div>
  </div>
  <div id="videoband">
    <video id="sceneVideo" muted loop playsinline preload="auto"></video>
    <div class="vyear" id="vYear"></div>
    <div class="vcaption" id="vCaption"></div>
    <div class="vsound" id="vSound" title="环境音">🔇</div>
    <div class="vtoggle" id="vToggle">▽ 展开画面</div>
  </div>
  <div id="book"><div id="booktrack"></div></div>
  <div id="bookNav">
    <span class="bn-arrow" id="bnPrev">‹</span>
    <span class="bn-dots" id="bnDots"></span>
    <span class="bn-arrow" id="bnNext">›</span>
  </div>

  <div id="decision">
    <div class="d-prompt">这一步，你怎么走？</div>
    <div class="d-q" id="dQ"></div>
    <div id="dOpts"></div>
  </div>

  <div id="tree">
    <span class="close" id="closeTree">✕</span>
    <h3>⌖ 时空穿梭</h3>
    <div class="hint">拖动光阴里的滑块，回到某个路口——那一年那一刻，换一种活法，长出另一段人生。</div>
    <div id="tlWrap">
      <div id="tlReadout"><span id="tlYear">—</span><span id="tlSub"></span></div>
      <div id="tlTrack"><div id="tlFill"></div><div id="tlNodes"></div><div id="tlHandle"></div></div>
      <div id="tlLabels"></div>
      <button id="tlGo">回到这一刻，重新选择</button>
      <div id="tlChoice" class="tl-choice"></div>
    </div>
  </div>

  <div id="hud">
    <span class="close" id="closeHud">✕</span>
    <h3>◴ 此身</h3>
    <div class="hud-sec">禀赋（缓慢变化）</div>
    <div id="hudAttrs"></div>
    <div class="hud-sec">际遇</div>
    <div id="hudRes"></div>
    <div class="hud-sec">境况</div>
    <div id="hudTags"></div>
    <div style="margin-top:22px;font-size:11px;color:var(--dim);line-height:1.7">
      你的选择会悄悄改变这些，它们又反过来决定下一步成与不成的胜算——这便是路径依赖。早年一个不起眼的选择，会在很多年后，长成截然不同的人生。
    </div>
  </div>

  <div id="intro">
    <h1>如 果</h1>
    <p>这一生，你本可以有许多种活法。</p>
    <p>如果当初，某一步换个走法——</p>
    <p>会长出怎样不一样的人生？</p>
    <button class="start" id="startBtn">开 始</button>
    <p class="ver">体验版 · 以一位 1994 年生人的一生为样本</p>
  </div>
</div>
<script>
/* ===== 《如果》离线体验版 · 继承 B 原型的视觉/视频/时钟/掷骰 =====
   零后端：所有叙述预先烤进 baked-data.json，本地掷骰决定看哪一档。
   固定 1994 山东农村样本。账号/自定义/纠正/羁绊在完整版开放。 */
const PLAYER={ name:'无名', birthYear:1994, gender:'男',
  place:'山东省德州市齐河县赵官镇付庄村',
  family:'北方农村家庭，靠种地和打零工，经济一般' };
const REALITY_YEAR=new Date().getFullYear();
const MAX_AGE=85;
const $=id=>document.getElementById(id);

// 路口骨架（与生成脚本一致）
const NODES=[
 {age:7,type:'生命',icon:'🎒',title:'开学那年',q:'要去上学吗？',open:'看看眼前的光景',theme:'到了上学的年纪，家里要不要供你念书',
  opts:[{t:'背上书包去上学',sub:'识文断字，可学费是一份负担',key:'入学'},{t:'先在家帮着干活',sub:'家里缺人手，念书的事往后放放',key:'晚学'}]},
 {age:15,type:'时代',icon:'📡',title:'中考之后',q:'十五岁的你，怎么选？',open:'看看眼前的光景',theme:'初中毕业，是继续念书，还是早早走上谋生的路',
  opts:[{t:'念高中，搏一个大学',sub:'改换门庭最直的路，却要熬上三年',key:'高中'},{t:'读职校学门手艺',sub:'一技傍身，早些能挣钱',key:'职校'},{t:'不念了，出去打工',sub:'眼下就有进项，前路也就此定了',key:'打工'}]},

// ===== 本地掷骰：把状态压成"顺遂/磕绊"两档（命运感离线化）=====
// 每个选项声明它考验的倾向 base（正=偏顺，负=偏险），叠加运气微扰。
const RECIPES={
 '7:入学':{base:18,eff:{INT:8,声望:3}},'7:晚学':{base:8,eff:{INT:-3,健康:4,财富:2}},
 '15:高中':{base:-4,eff:{INT:12,WIL:6,精力:-8}},'15:职校':{base:8,eff:{INT:4,财富:5}},'15:打工':{base:4,eff:{财富:10,健康:-6,WIL:5}},
 '18:进城':{base:-8,eff:{财富:8,CHA:8,声望:6,精力:-10}},'18:求稳':{base:14,eff:{财富:6,声望:8,健康:4}},'18:专精':{base:5,eff:{财富:7,WIL:8}},
 '23:闯荡':{base:-7,eff:{财富:12,CHA:6,精力:-12,声望:8}},'23:安稳':{base:14,eff:{财富:5,健康:5,声望:5}},'23:自立':{base:-12,eff:{财富:15,声望:10,精力:-15}},
 '27:成家':{base:10,eff:{财富:-8,健康:5,声望:6}},'27:缓婚':{base:8,eff:{财富:8,声望:3}},'27:随缘':{base:4,eff:{精力:5}},
 '32:守成':{base:16,eff:{财富:6,声望:4}},'32:再搏':{base:-11,eff:{财富:14,精力:-15,声望:8}},'32:归乡':{base:12,eff:{财富:-4,健康:8,精力:10}},
 '38:守家':{base:14,eff:{健康:-4,财富:4,声望:3}},'38:求变':{base:-12,eff:{财富:8,精力:-12}},
 '50:安度':{base:16,eff:{健康:2,精力:4}},'50:了愿':{base:2,eff:{声望:6,精力:-4}},
 '65:知足':{base:18,eff:{健康:2}},'65:遗憾':{base:0,eff:{声望:-2}},
};
const ATTR_NAMES={INT:'智力',CON:'体质',CHA:'魅力',EQ:'情商',WIL:'意志',LUK:'运气'};
const clamp=(v,lo=0,hi=100)=>Math.max(lo,Math.min(hi,v));
function freshState(){ return {
  attrs:{INT:50,CON:55,CHA:50,EQ:50,WIL:52,LUK:50},
  res:{健康:80,财富:20,精力:75,声望:30}, tags:new Set() }; }
let STATE=freshState();
function rollTone(recipeKey){
  const r=RECIPES[recipeKey];
  const a=STATE.attrs;
  // 综合分：相关属性均值近似用全属性均值 + base + 运气 + 精力/健康拖累
  const attrAvg=Object.values(a).reduce((s,v)=>s+v,0)/6;
  const luck=(a.LUK-50)*0.3 + (Math.random()*30-15);
  const fatigue=(STATE.res.精力<35?-10:0)+(STATE.res.健康<40?-8:0);
  const score=clamp(attrAvg+(r?r.base:4)+luck+fatigue,5,95);
  return score>=50?'顺遂':'磕绊';
}
function applyOutcome(recipeKey,tone){
  const r=RECIPES[recipeKey]; if(!r) return;
  const m=tone==='顺遂'?1.0:-0.7;
  for(const [k,v] of Object.entries(r.eff||{})){
    const delta=v>=0?v*m:v*Math.abs(m);
    if(k in STATE.attrs) STATE.attrs[k]=clamp(STATE.attrs[k]+delta);
    else if(k in STATE.res) STATE.res[k]=clamp(STATE.res[k]+delta);
  }
}

// ===== 世界时钟（镜像现实，年份随人生阶段）=====
const WK=['日','一','二','三','四','五','六'];
let mirrorYear=PLAYER.birthYear, _tick=null;
function nowGameMs(){ const r=new Date();
  return new Date(mirrorYear,r.getMonth(),r.getDate(),r.getHours(),r.getMinutes(),r.getSeconds()).getTime(); }
function setMirrorYear(y){ mirrorYear=y; }
function fmtClock(ms){ const d=new Date(ms),p=n=>String(n).padStart(2,'0');
  return {date:`${d.getFullYear()}年${p(d.getMonth()+1)}月${p(d.getDate())}日`,
    time:`${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`,week:`周${WK[d.getDay()]}`,year:d.getFullYear()}; }
function seasonOf(ms){ const m=new Date(ms).getMonth()+1;
  return m>=3&&m<=5?'春':m>=6&&m<=8?'夏':m>=9&&m<=11?'秋':'冬'; }
function startTicking(){ if(_tick)clearInterval(_tick);
  _tick=setInterval(()=>renderClock(nowGameMs()),1000); renderClock(nowGameMs()); }
function eraLabel(y){ return y<2003?'世纪之交':y<2010?'入世后的高速发展':y<2016?'智能手机普及之初':y<2021?'移动互联网时代':y<=REALITY_YEAR?'近年':'来日'; }
function renderClock(ms){ const f=fmtClock(ms);
  $('clkDate').textContent=f.date; $('clkTime').textContent=f.time;
  const age=f.year-PLAYER.birthYear;
  $('clkAge').textContent=`${f.week} · ${seasonOf(ms)} · ${age<0?'尚未出生':age+'岁'} · ${eraLabel(f.year)}`;
  $('clkWhere').textContent=curWhere?'· '+curWhere:''; }

// ===== 视频场景 =====
const SCENE_VIDEOS={
  classroom:{src:'assets/video/classroom-portrait.mp4'}, countryside:{src:'assets/video/countryside.mp4'},
  office:{src:'assets/video/office.mp4'}, wedding:{src:'assets/video/wedding.mp4'},
  home:{src:'assets/video/home.mp4'}, default:{src:'assets/video/default.mp4'} };
function pickSceneKey(ctx){ const {theme='',age=0,choiceKey=''}=ctx, s=theme+choiceKey;
  if(/婚|成家|嫁|娶|恋|相亲|配偶/.test(s)) return 'wedding';
  if(/初入社会|谋一份|营生|立身|第一份/.test(s)) return 'office';
  if(/上学|入学|念书|读书|高中|职校|大学|中考|高考|学堂/.test(s)) return 'classroom';
  if(/进城|城市|闯|打拼|公司|职场|创业|事业|写字楼|办公/.test(s)) return 'office';
  if(/务农|种地|打工|进厂|工地|归乡|回乡|乡间|村里|田/.test(s)) return 'countryside';
  if(/中年|暮年|守家|安度|晚|养老|含饴|家里|子女|父母|知天命|回望/.test(s)) return 'home';
  if(age<=12) return 'classroom'; if(age<=22) return 'countryside'; if(age<=45) return 'office'; return 'home'; }
let _curSceneKey=null,_soundOn=false;
const FALLBACK_ORDER=['home','countryside','classroom'];
function setSceneVideo(key,year){ const vid=$('sceneVideo');
  if(_curSceneKey!==key){ _curSceneKey=key;
    vid.onerror=()=>{ for(const k of FALLBACK_ORDER){ if(k!==key&&SCENE_VIDEOS[k]){ vid.src=SCENE_VIDEOS[k].src; vid.load(); vid.play().catch(()=>{}); break; } } };
    vid.src=(SCENE_VIDEOS[key]||SCENE_VIDEOS.default).src; vid.muted=!_soundOn; vid.load(); vid.play().catch(()=>{}); }
  if(year!=null) $('vYear').textContent=`${year}年 · ${eraLabel(year)}`; }
// 视频大小完全由用户控制：expand/shrink 只更新字幕，不再强制改变高度
function expandVideo(cap){ $('vCaption').textContent=cap||''; }
function shrinkVideo(){ $('vCaption').textContent=''; }

// ===== 数据加载 =====
let BAKED=null;
const splitPara=t=>String(t||'').split(/\n\s*\n/).map(s=>s.trim()).filter(Boolean);
// 取某选项某档叙述；缺该档则回退另一档；都缺给兜底
function narrationFor(age,key,tone){
  const e=BAKED&&BAKED.narrations&&BAKED.narrations[`${age}:${key}`];
  if(!e) return ['（这一段的光阴，尚未被记下。）'];
  const txt=e[tone]||e['顺遂']||e['磕绊']||Object.values(e)[0];
  return splitPara(txt);
}
function hasTone(age,key,tone){ const e=BAKED&&BAKED.narrations&&BAKED.narrations[`${age}:${key}`]; return !!(e&&e[tone]); }

// ===== 章节系统（横向翻页轨道）=====
const booktrack=$('booktrack');
let chapters=[],curChapter=-1,stream=null;
function newChapter(){ const ch=document.createElement('div'); ch.className='chapter';
  booktrack.appendChild(ch); chapters.push(ch); stream=ch; goToChapter(chapters.length-1); return ch; }
function goToChapter(i){ if(i<0||i>=chapters.length) return; curChapter=i;
  booktrack.style.transform=`translateX(${-i*100}%)`; stream=chapters[i]; renderBookNav(); }
function renderBookNav(){ const dots=$('bnDots'); if(!dots) return; dots.innerHTML='';
  chapters.forEach((_,i)=>{ const d=document.createElement('span'); d.className='dot'+(i===curChapter?' on':'');
    d.onclick=()=>goToChapter(i); dots.appendChild(d); });
  $('bnPrev').classList.toggle('disabled',curChapter<=0);
  $('bnNext').classList.toggle('disabled',curChapter>=chapters.length-1); }
function resetBook(){ booktrack.innerHTML=''; booktrack.style.transform='translateX(0)'; chapters=[]; curChapter=-1; stream=null; renderBookNav(); }
$('bnPrev').onclick=()=>goToChapter(curChapter-1);
$('bnNext').onclick=()=>goToChapter(curChapter+1);
document.addEventListener('keydown',e=>{ if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if(e.key==='ArrowLeft') goToChapter(curChapter-1); else if(e.key==='ArrowRight') goToChapter(curChapter+1); });
let _tsx=0,_tsy=0; const book=$('book');
book.addEventListener('touchstart',e=>{_tsx=e.touches[0].clientX;_tsy=e.touches[0].clientY;},{passive:true});
book.addEventListener('touchend',e=>{ const dx=e.changedTouches[0].clientX-_tsx,dy=e.changedTouches[0].clientY-_tsy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5) goToChapter(curChapter+(dx<0?1:-1)); },{passive:true});

// ===== 叙述渲染 =====
function scrollDown(){ setTimeout(()=>{ if(stream) stream.scrollTo({top:stream.scrollHeight,behavior:'smooth'}); },120); }
function pushNarr(lines,dim){ lines.forEach((line,i)=>{ const d=document.createElement('div');
  d.className='narr'+(dim?' dim':''); d.style.animationDelay=(i*0.12)+'s'; d.textContent=line; stream.appendChild(d); }); scrollDown(); }
function yearTag(txt){ const t=document.createElement('div'); t.className='yeartag'; t.textContent=txt; stream.appendChild(t); }
function pushTierBadge(tone){ const b=document.createElement('div'); b.className='tier-badge tier-'+tone;
  b.textContent=`命运掷下：${tone}　${tone==='顺遂'?'· 称得上顺当':'· 磕磕绊绊'}`; stream.appendChild(b); scrollDown(); }

// 叙述段（过去可"纠正"——离线版给完整版提示；未来只读）
function pushNarrSeg(lines,meta){
  const seg=document.createElement('div'); seg.className='ai-seg';
  lines.forEach((line,i)=>{ const d=document.createElement('div'); d.className='narr';
    d.style.animationDelay=(i*0.12)+'s'; d.textContent=line; seg.appendChild(d); });
  if(meta.year<=REALITY_YEAR){
    const c=document.createElement('div'); c.className='correct-link'; c.textContent='✎ 此事并非如此……';
    c.onclick=()=>{ if(seg.querySelector('.future-deny'))return; const d=document.createElement('div');
      d.className='future-deny'; d.textContent='（体验版里，纠正暂未开放。完整版中，你可以说出真实发生的事，让往后的人生顺着真相重写。）';
      seg.appendChild(d); setTimeout(()=>d.classList.add('show'),20); };
    seg.appendChild(c);
  }else{
    const tag=document.createElement('div'); tag.className='future-tag'; tag.textContent='— 来日之事，不过一卷尚未写就的猜想 —'; seg.appendChild(tag);
    const c=document.createElement('div'); c.className='correct-link'; c.textContent='✎ 我想改写此处';
    c.onclick=()=>{ if(seg.querySelector('.future-deny'))return; const d=document.createElement('div');
      d.className='future-deny'; d.textContent='人世万般来日，皆不在掌心裁量之中。';
      seg.appendChild(d); setTimeout(()=>d.classList.add('show'),20); };
    seg.appendChild(c);
  }
  stream.appendChild(seg); scrollDown();
}

// ===== 状态 =====
let curAge=0, curWhere=PLAYER.place, eventIdx=0, saveTree=[], decidedAges={}, finaleDone=false, _forwardTarget=null;

// ===== 事件卡 =====
function showCard(ev){

function openDecision(ev){

  cbox.querySelector('.send').onclick=()=>{ const t=cbox.querySelector('textarea'); t.value=''; t.placeholder='（体验版暂未开放自由输入，完整版见。）'; };
  box.appendChild(custom); box.appendChild(cbox);
  $('decision').classList.add('show');
}

// ===== 选择 → 本地掷骰 → 叙述 =====
function choose(ev,o){
  $('decision').classList.remove('show'); shrinkVideo();
  const year=PLAYER.birthYear+ev.age, rk=`${ev.age}:${o.key}`;
  const tone=rollTone(rk); applyOutcome(rk,tone); renderHud();
  decidedAges[ev.age]=true;
  const node={age:ev.age,year,title:ev.title,choice:o.t,key:o.key,tone,where:curWhere};
  saveTree.push(node); renderTree();
  pushNarr([`▸ 你选了这条路：${o.t}`],true);
  pushTierBadge(tone);
  const lines=narrationFor(ev.age,o.key,tone);
  pushNarrSeg(lines,{age:ev.age,year});
  if(eventIdx<NODES.length && NODES[eventIdx].age===ev.age) eventIdx++;
  afterChoice();
}
function afterChoice(){
  if(_forwardTarget!=null && curAge<_forwardTarget) stepForward();
  else { _forwardTarget=null; addContinue(); }
}
// ===== 此刻面板 =====
function addContinue(){
  const latest=chapters[chapters.length-1]||stream;
  const oldp=latest.querySelector('.now-panel'); if(oldp) oldp.remove();
  if(finaleDone) return;
  const p=document.createElement('div'); p.className='now-panel';
  const y=PLAYER.birthYear+curAge;
  const moreAhead=!!NODES.find(e=>e.age>curAge && !decidedAges[e.age]);
  const canEnd=curAge>=50;
  p.innerHTML=`<div class="np-now">· 此刻 ·</div>
    <div class="np-line">${y}年，你 ${curAge} 岁${curWhere?'，在'+curWhere:''}。</div>
    <div class="np-acts">
      ${moreAhead?`<span class="np-onward">让光阴继续 ›</span><span class="np-dot">·</span>`:''}
      <span class="np-travel">时空穿梭</span>
      ${canEnd?`<span class="np-dot">·</span><span class="np-end-link">走到尽头</span>`:''}
    </div>`;
  const on=p.querySelector('.np-onward'); if(on) on.onclick=()=>{ p.remove(); onwardStep(); };
  const tv=p.querySelector('.np-travel'); if(tv) tv.onclick=()=>{ renderTree(); $('tree').classList.add('show'); };
  const el=p.querySelector('.np-end-link'); if(el) el.onclick=()=>{ p.remove(); renderFinale(); };
  latest.appendChild(p); if(latest===stream) scrollDown();
}

// ===== 推进 =====
function onwardStep(){
  const nextJ=NODES.find(e=>e.age>curAge && !decidedAges[e.age]);
  _forwardTarget = nextJ ? nextJ.age : Math.min(MAX_AGE,curAge+5);
  stepForward();
}
function stepForward(){
  // 自动走过中间未决策路口（按状态默认选项）
  while(true){
    const j=NODES.find(e=>e.age>curAge && e.age<_forwardTarget && !decidedAges[e.age]);
    if(!j) break; autoResolve(j);
  }
  const at=NODES.find(e=>e.age===_forwardTarget && !decidedAges[e.age]);
  if(at){ renderSpanTo(_forwardTarget,at); _forwardTarget=null; return; }
  renderSpanTo(_forwardTarget,null); _forwardTarget=null;
}
function autoPick(ev){ // 选 base 最高（最稳）的选项作默认
  let best=ev.opts[0],bs=-99;
  ev.opts.forEach(o=>{ const r=RECIPES[`${ev.age}:${o.key}`]; const s=r?r.base:0; if(s>bs){bs=s;best=o;} });
  return best;
}
function autoResolve(ev){
  const year=PLAYER.birthYear+ev.age; setMirrorYear(year); curAge=ev.age;
  newChapter();
  const o=autoPick(ev), rk=`${ev.age}:${o.key}`;
  const tone=rollTone(rk); applyOutcome(rk,tone); renderHud();
  decidedAges[ev.age]=true;
  saveTree.push({age:ev.age,year,title:ev.title,choice:o.t,key:o.key,tone,where:curWhere,auto:true}); renderTree();
  setSceneVideo(pickSceneKey({theme:ev.theme,age:ev.age,choiceKey:o.key}),year);
  yearTag(`${year}年 · 你 ${ev.age}岁 · ${ev.type}节点`);
  pushNarr([`▸ 顺势而为：${o.t}`],true); pushTierBadge(tone);
  pushNarrSeg(narrationFor(ev.age,o.key,tone),{age:ev.age,year});
  if(eventIdx<NODES.length && NODES[eventIdx].age<=ev.age) eventIdx=NODES.findIndex(e=>e.age>ev.age); if(eventIdx<0) eventIdx=NODES.length;
}
function renderSpanTo(toAge,ev){
  const year=PLAYER.birthYear+toAge; setMirrorYear(year); curAge=toAge; newChapter();
  if(ev){ yearTag(`${year}年 · 你 ${toAge}岁 · ${ev.type}节点`); showCard(ev); }
  else {
    setSceneVideo(pickSceneKey({age:toAge}),year);
    yearTag(`${year}年 · 你 ${toAge}岁`);
    pushNarr([`光阴流淌，岁月无言。转眼你已 ${toAge} 岁。`],true);
    addContinue();
  }
}

// ===== 终章 =====
function pickFinaleKey(){
  if(!BAKED||!BAKED.finales) return null;
  // 按状态择基调：财富+声望+健康综合
  const s=STATE.res.财富*0.4+STATE.res.声望*0.3+STATE.res.健康*0.3;
  const want = s>=58?'圆满' : s<=38?'遗憾' : '寻常';
  return BAKED.finales[want]?want : (BAKED.finales['寻常']?'寻常':Object.keys(BAKED.finales)[0]);
}
function renderFinale(){
  finaleDone=true; newChapter();
  const year=PLAYER.birthYear+curAge;
  setSceneVideo('home',year); expandVideo('');
  yearTag(`${year}年 · 享年 ${curAge} 岁 · 终`);
  const fkey=pickFinaleKey();
  const lines = fkey ? splitPara(BAKED.finales[fkey]) : ['这一生，就这样过完了。','平原上的风吹了一辈子，终归是平的。'];
  const seg=document.createElement('div'); seg.className='finale-seg';
  lines.forEach((line,i)=>{ const d=document.createElement('div'); d.className='narr finale-line';
    d.style.animationDelay=(i*0.5)+'s'; d.textContent=line; seg.appendChild(d); });
  const sign=document.createElement('div'); sign.className='finale-sign';
  sign.textContent=`—— ${PLAYER.name||'无名'}，${PLAYER.birthYear}—${year}`;
  sign.style.animationDelay=(lines.length*0.5+0.3)+'s'; seg.appendChild(sign);
  const again=document.createElement('div'); again.className='finale-again';
  again.textContent='这一生，本可以是另外的模样 · 回到某一年';
  again.style.animationDelay=(lines.length*0.5+1.2)+'s';
  again.onclick=()=>{ renderTree(); $('tree').classList.add('show'); };
  seg.appendChild(again); stream.appendChild(seg); scrollDown();
}

// ===== 状态 HUD =====
function statRow(name,val){ const row=document.createElement('div'); row.className='stat-row';
  row.innerHTML=`<div class="stat-name">${name}</div><div class="stat-bar"><div class="stat-fill" style="width:${val}%"></div></div><div class="stat-val">${Math.round(val)}</div>`; return row; }
function renderHud(){
  const ea=$('hudAttrs'),er=$('hudRes'),et=$('hudTags'); ea.innerHTML='';er.innerHTML='';et.innerHTML='';
  for(const [k,v] of Object.entries(STATE.attrs)) ea.appendChild(statRow(ATTR_NAMES[k],v));
  for(const [k,v] of Object.entries(STATE.res)) er.appendChild(statRow(k,v));
  if(STATE.tags.size===0) et.innerHTML='<span style="font-size:12px;color:var(--dim)">尚是一张白纸。</span>';
  else STATE.tags.forEach(t=>{ const c=document.createElement('span'); c.className='tag-chip'; c.textContent=t; et.appendChild(c); });
}
$('openHud').onclick=()=>{ renderHud(); $('hud').classList.add('show'); };
$('closeHud').onclick=()=>$('hud').classList.remove('show');

// ===== 时空穿梭 · 连续时间轴 =====
let _tlAge=0;
function renderTree(){
  const nodesBox=$('tlNodes'),labels=$('tlLabels'); if(!nodesBox) return;
  nodesBox.innerHTML='';
  saveTree.forEach(n=>{ const pct=n.age/MAX_AGE*100; const d=document.createElement('div');
    d.className='tlnode'+(n.auto?'':''); d.style.left=pct+'%'; d.title=`${n.year}年·${n.age}岁·${n.choice}`;
    d.onclick=()=>setTlAge(n.age); nodesBox.appendChild(d); });
  labels.innerHTML=`<span>${PLAYER.birthYear}年·0岁</span><span>${PLAYER.birthYear+MAX_AGE}年·${MAX_AGE}岁</span>`;
  setupTlDrag(); setTlAge(curAge);
}
function setTlAge(age){ age=Math.max(0,Math.min(MAX_AGE,Math.round(age))); _tlAge=age;
  const p=age/MAX_AGE*100; $('tlHandle').style.left=p+'%'; $('tlFill').style.width=p+'%';
  const year=PLAYER.birthYear+age, future=age>curAge;
  $('tlYear').textContent=`${year}年`;
  const atNode=saveTree.find(n=>n.age===age);
  if(atNode){ $('tlSub').textContent=`你 ${age}岁 · ${atNode.title}`; $('tlChoice').textContent=`当年你选了：${atNode.choice}（${atNode.tone}）`; }
  else { $('tlSub').textContent=`你 ${age}岁 · ${eraLabel(year)}`;
    $('tlChoice').textContent=age===curAge?'此刻所在':(future?'尚未抵达的来日 —— 拨过去，看看那时的你':'回望那一年'); }
  $('tlGo').classList.toggle('ready',age!==curAge);
  $('tlGo').textContent=future?'拨到这一刻，看看往后':'回到这一年，重新活过';
}
function setupTlDrag(){ const track=$('tlTrack'),handle=$('tlHandle');
  const pick=x=>{ const r=track.getBoundingClientRect(); setTlAge(Math.max(0,Math.min(1,(x-r.left)/r.width))*MAX_AGE); };
  const move=e=>pick(e.touches?e.touches[0].clientX:e.clientX);
  const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',move); document.removeEventListener('touchend',up); };
  const down=e=>{ e.preventDefault(); document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up); };
  handle.onmousedown=down; handle.ontouchstart=down;
  track.onclick=e=>{ if(e.target===handle)return; pick(e.clientX); };
}
$('tlGo').onclick=()=>{ if(_tlAge!==curAge) goToAge(_tlAge); };
$('openTree').onclick=()=>{ renderTree(); $('tree').classList.add('show'); };
$('closeTree').onclick=()=>$('tree').classList.remove('show');

function goToAge(target){ $('tree').classList.remove('show');
  if(target<curAge) rewindTo(target); else { _forwardTarget=target; stepForward(); } }
function rewindTo(target){
  // 回滚：状态重算到该年之前所有已决策路口
  const keep=saveTree.filter(n=>n.age<target);
  saveTree=keep;
  STATE=freshState();
  keep.forEach(n=>applyOutcome(`${n.age}:${n.key}`,n.tone));
  Object.keys(decidedAges).forEach(a=>{ if(+a>=target) delete decidedAges[a]; });
  curWhere=keep.length?keep[keep.length-1].where:PLAYER.place;
  curAge=target; finaleDone=false;
  eventIdx=NODES.findIndex(e=>e.age>=target); if(eventIdx<0) eventIdx=NODES.length;
  setMirrorYear(PLAYER.birthYear+target); renderHud();
  resetBook(); newChapter();
  const year=PLAYER.birthYear+target;
  pushNarr([`⟲ 时光倒流，回到 ${year}年，你 ${target}岁那时。`,`有些路口，值得重新站一次。`],true);
  const ev=NODES.find(e=>e.age===target);
  if(ev && !decidedAges[target]){ setTimeout(()=>{ yearTag(`${year}年 · 你 ${target}岁 · 旧地重临`); showCard(ev); },600); }
  else setTimeout(addContinue,600);
}

// ===== 开场 =====
async function boot(){
  try{ const r=await fetch('baked-data.json'); BAKED=await r.json(); }
  catch(e){ BAKED={scenes:{},narrations:{},finales:{}}; }
}
$('startBtn').onclick=async ()=>{
  if(!BAKED) await boot();
  const intro=$('intro'); intro.style.opacity='0'; setTimeout(()=>intro.style.display='none',800);
  STATE=freshState(); curAge=0; curWhere=PLAYER.place; eventIdx=0; saveTree=[]; decidedAges={}; finaleDone=false; _forwardTarget=null;
  setMirrorYear(PLAYER.birthYear); startTicking(); renderHud();
  setSceneVideo('default',PLAYER.birthYear); shrinkVideo();
  resetBook(); newChapter();
  pushNarr([`${PLAYER.birthYear}年，你降生在${PLAYER.place}。${PLAYER.family}。`,
    `起点由不得人挑拣。你的一生，自这一年起，徐徐铺开。`]);
  setTimeout(addContinue,1400);
};
boot(); // 预加载数据
</script>
